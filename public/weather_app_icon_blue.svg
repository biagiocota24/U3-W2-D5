      <line x1="0" y1="-120" x2="0" y2="-90" stroke="#fef9c3" stroke-width="14" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(254, 249, 195);color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
      <line x1="0" y1="-120" x2="0" y2="-90" stroke="#fef9c3" stroke-width="14" stroke-linecap="round" transform="rotate(45)" style="fill:rgb(0, 0, 0);stroke:rgb(254, 249, 195);color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
